<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020202"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="200" fill="#f59e0b" opacity="0.05"/>
  <circle cx="1100" cy="530" r="300" fill="#ea580c" opacity="0.05"/>
  
  <!-- Icon -->
  <rect x="520" y="180" width="80" height="80" rx="16" fill="url(#accentGrad)"/>
  <path d="M540 210h40M540 225h30M540 240h35" stroke="#020202" stroke-width="5" stroke-linecap="round"/>
  <circle cx="572" cy="240" r="6" fill="#020202"/>
  
  <!-- Logo text -->
  <text x="600" y="320" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#e5e5e5" text-anchor="middle">RecommendMe AI</text>
  
  <!-- Tagline -->
  <text x="600" y="370" font-family="system-ui, sans-serif" font-size="24" fill="#9ca3af" text-anchor="middle">AI-Powered CRM Assistant</text>
  
  <!-- Features -->
  <text x="600" y="450" font-family="system-ui, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Lead Management • Appointments • Invoices • Natural Language Interface</text>
</svg>
